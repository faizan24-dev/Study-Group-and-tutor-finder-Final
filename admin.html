<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Finder.pk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="custom-bg-zinc">

    <nav class="navbar navbar-expand-lg border-bottom custom-border-gold py-3" style="background-color: var(--purple-accent);">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase tracking-wide text-white" href="admin.html">
                Finder<span class="text-dark">.pk</span> 
                <span class="badge bg-dark text-warning ms-2 align-middle" style="font-size: 0.6rem;">ADMIN PANEL</span>
            </a>
            <div class="d-flex">
                <a href="index.html" class="btn btn-dark btn-sm fw-bold border-0 shadow-sm">Exit to User Site</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        
        <section class="row mb-5 g-4" id="stats-container">
            </section>

        <section class="card bg-dark border-0 shadow-lg p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 fw-bold custom-text-gold mb-0">Manage All Listings</h2>
            </div>
            
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead class="custom-border-purple">
                        <tr>
                            <th scope="col">Type</th>
                            <th scope="col">Title / Name</th>
                            <th scope="col">Subject / Expertise</th>
                            <th scope="col">Status</th>
                            <th scope="col" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary shadow-lg">
                <div class="modal-header custom-border-purple">
                    <h5 class="modal-title fw-bold custom-text-gold">Edit Listing</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="edit-form">
                        <input type="hidden" id="edit-id">
                        <input type="hidden" id="edit-type">
                        
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-secondary">Title / Name</label>
                            <input type="text" class="form-control bg-secondary border-0 text-light" id="edit-title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-secondary">Subject / Expertise</label>
                            <input type="text" class="form-control bg-secondary border-0 text-light" id="edit-subject" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-secondary">Schedule / Availability</label>
                            <input type="text" class="form-control bg-secondary border-0 text-light" id="edit-schedule" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-secondary">Contact / Email</label>
                            <input type="email" class="form-control bg-secondary border-0 text-light" id="edit-contact" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-secondary">Visibility Status</label>
                            <select class="form-select bg-secondary border-0 text-light" id="edit-status" required>
                                <option value="Active">Active</option>
                                <option value="Hidden">Hidden</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn custom-btn-purple fw-bold" id="save-edit-btn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
